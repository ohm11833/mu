<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Love 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #ffe6ea;
            background-image: radial-gradient(#ffb3c6 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Mali', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- กล่องหลัก --- */
        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
            position: relative;
            z-index: 10;
        }

        /* --- หน้าจอต่างๆ --- */
        .screen { display: none; flex-direction: column; align-items: center; animation: fadeIn 0.8s ease; }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- หน้า 1: ซองจดหมาย --- */
        .envelope-wrapper {
            cursor: pointer;
            animation: bounce 2s infinite;
        }
        .envelope-wrapper img { width: 150px; }
        .click-text { color: #ff4d6d; margin-top: 20px; font-size: 20px; font-weight: 600; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- รูป GIF น้องหมี --- */
        .gif-container img { width: 180px; height: 180px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; }

        /* --- ข้อความ --- */
        .question { font-size: 24px; color: #ff3366; font-weight: 600; margin-bottom: 10px; }
        .sub-text { font-size: 16px; color: #666; margin-bottom: 25px; }

        /* --- ปุ่มกด --- */
        .btn-group { display: flex; gap: 15px; position: relative; width: 100%; justify-content: center; height: 50px;}
        button {
            padding: 12px 30px; font-size: 18px; font-family: 'Mali', cursive;
            border: none; border-radius: 50px; cursor: pointer; font-weight: 600;
            transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-yes { background: #ff4d6d; color: white; z-index: 2; }
        .btn-yes:active { transform: scale(0.9); }
        .btn-no { background: #f8f9fa; color: #ff4d6d; border: 2px solid #ff4d6d; position: absolute; z-index: 5; }

        /* --- พลุหัวใจ --- */
        .heart-burst { position: absolute; font-size: 24px; pointer-events: none; animation: flyOut 1s ease-out forwards; }
        @keyframes flyOut {
            0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(1.5) rotate(45deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="screen1" class="screen active">
            <div class="envelope-wrapper" onclick="openLetter()">
                <div style="font-size: 120px; filter: drop-shadow(0 10px 10px rgba(255,105,180,0.4));">💌</div>
            </div>
            <div class="click-text">มีจดหมายส่งถึงคับ! <br> (จิ้มเพื่อเปิดเลยย👆)</div>
        </div>

        <div id="screen2" class="screen">
            <div class="gif-container">
                <img id="bearGif" src="https://media.tenor.com/EfhwAOn_E5QAAAAi/tkthao219-peach.gif" alt="Cute Bear">
            </div>
            <div class="question">รักเค้ามั้ย? 🥺</div>
            <div class="sub-text">ตอบดีๆ นะ มีผลต่อหัวใจเค้ามาก 💖</div>
            
            <div class="btn-group">
                <button class="btn-yes" onclick="answerYes()">รักสิ! 🥰</button>
                <button class="btn-no" id="btnNo" onmouseover="dodgeBtn()" ontouchstart="dodgeBtn()">ไม่รัก 😜</button>
            </div>
        </div>

        <div id="screen3" class="screen">
            <div class="gif-container">
                <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif" alt="Happy Bear">
            </div>
            <div class="question" style="font-size: 28px;">เย้! เค้าก็รักเทอนะ ♾️💕</div>
            <div class="sub-text" style="font-size: 18px; color: #ff3366; margin-top:10px;">
                ขอบคุณที่น่ารักกับเค้ามาตลอดเลยนะ<br>จุ๊บเหม่ง 1 ที! จุ๊บๆ 😘
            </div>
        </div>

    </div>

    <script>
        // ฟังก์ชันเปลี่ยนหน้าจากซองจดหมาย ไปหน้าคำถาม
        function openLetter() {
            document.getElementById('screen1').classList.remove('active');
            setTimeout(() => {
                document.getElementById('screen2').classList.add('active');
            }, 100);
        }

        // ฟังก์ชันปุ่มหนีสุดกวน
        function dodgeBtn() {
            const btn = document.getElementById('btnNo');
            const gif = document.getElementById('bearGif');
            
            // เปลี่ยนรูปเป็นหมีร้องไห้ตอนเอานิ้วไปโดนปุ่ม "ไม่รัก"
            gif.src = "https://media.tenor.com/cwhAMk_0c0EAAAAi/tkthao219-peach.gif"; 

            // คำนวณขอบเขตไม่ให้ปุ่มหลุดจอ
            const maxX = 150; // ระยะซ้ายขวาที่หนีได้
            const maxY = 150; // ระยะบนล่างที่หนีได้
            
            const randomX = (Math.random() * maxX * 2) - maxX;
            const randomY = (Math.random() * maxY * 2) - maxY;
            
            btn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }

        // ฟังก์ชันตอนแฟนกดยอมแพ้ (กดรัก)
        function answerYes() {
            document.getElementById('screen2').classList.remove('active');
            document.getElementById('screen3').classList.add('active');
            
            // สร้างพลุหัวใจกระจาย
            for(let i = 0; i < 50; i++) {
                createHeartBurst();
            }
        }

        function createHeartBurst() {
            const hearts = ['❤️', '💖', '💘', '🌸', '✨'];
            const el = document.createElement('div');
            el.classList.add('heart-burst');
            el.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            
            el.style.left = '50%';
            el.style.top = '50%';
            
            const angle = Math.random() * Math.PI * 2;
            const distance = 100 + Math.random() * 200;
            
            el.style.setProperty('--x', Math.cos(angle) * distance + 'px');
            el.style.setProperty('--y', Math.sin(angle) * distance + 'px');
            
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
    </script>
</body>
</html>

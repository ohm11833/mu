<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกค่าใช้จ่าย</title>
    <link rel="stylesheet" href="css/cument.css">
</head>
<body>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <h2 style="text-align: center; color: #333; margin-bottom: 20px;">ลงบันทึกค่าใช้จ่าย</h2>
        
        <div class="card">
            <div class="row">
                <label>หมายเลขรถ</label>
                <input type="text" name="car_number" placeholder="เช่น กข 1234" required>
            </div>

            <div class="row">
                <label>ค่าใช้จ่าย (บาท)</label>
                <input type="number" name="expense_amount" placeholder="0.00" step="0.01" required>
            </div>

            <div class="row">
                <label>บิลเอกสาร</label>
                
                <div class="image-preview-container">
                    <img id="image_preview" src="#" alt="ตัวอย่างรูปภาพ" style="display: none;">
                </div>

                <div class="file-box">
                    <span class="btn-file">📷 คลิกเพื่อแนบรูปภาพ</span>
                    <input type="file" name="bill_file" accept="image/*" onchange="previewImage(this)">
                </div>
            </div>
        </div>

        <button type="submit" class="submit-btn">บันทึกข้อมูล</button>
    </form>

    <script>
        function previewImage(input) {
            const preview = document.getElementById('image_preview');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            } else {
                preview.src = "#";
                preview.style.display = 'none';
            }
        }
    </script>
</body>
</html>

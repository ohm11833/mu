<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Love 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body {
            /* พื้นหลังไล่สีละมุนๆ และเคลื่อนไหวได้ */
            background: linear-gradient(-45deg, #ffe6ea, #ffb3c6, #ffd1dc, #fff0f3);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Mali', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ลายจุดตกแต่งพื้นหลัง */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.6) 2px, transparent 2px);
            background-size: 30px 30px;
            z-index: 1;
        }

        /* --- กล่องหลัก (Glassmorphism) --- */
        .container {
            width: 90%;
            max-width: 420px;
            /* ทำพื้นหลังโปร่งแสงและเบลอ */
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(255, 105, 180, 0.25);
            position: relative;
            z-index: 10;
        }

        /* --- หน้าจอต่างๆ --- */
        .screen { display: none; flex-direction: column; align-items: center; animation: fadeIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- หน้า 1: ซองจดหมาย --- */
        .envelope-wrapper {
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            padding: 20px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(255, 182, 193, 0.6);
            transition: transform 0.3s ease;
        }
        .envelope-wrapper:hover { transform: scale(1.1); }
        .envelope-icon {
            font-size: 100px; 
            line-height: 1;
            filter: drop-shadow(0 15px 15px rgba(255,105,180,0.4));
        }
        .click-text { 
            color: #ff4d6d; 
            margin-top: 25px; 
            font-size: 22px; 
            font-weight: 700;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- รูป GIF --- */
        .gif-container { position: relative; margin-bottom: 25px; }
        .gif-container img { 
            width: 180px; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.3);
        }

        /* --- ข้อความ --- */
        .question { 
            font-size: 28px; 
            font-weight: 700; 
            margin-bottom: 10px; 
            background: linear-gradient(45deg, #ff3366, #ff758c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(255,51,102,0.1);
        }
        .sub-text { font-size: 16px; color: #777; margin-bottom: 30px; font-weight: 600; }

        /* --- ปุ่มกด --- */
        .btn-group { display: flex; gap: 15px; position: relative; width: 100%; justify-content: center; height: 55px;}
        button {
            padding: 12px 35px; font-size: 18px; font-family: 'Mali', cursive;
            border: none; border-radius: 50px; cursor: pointer; font-weight: 700;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        }
        
        .btn-yes { 
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3); 
            color: white; 
            z-index: 2; 
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
            animation: pulseBtn 2s infinite;
        }
        .btn-yes:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 12px 25px rgba(255, 77, 109, 0.5); }
        .btn-yes:active { transform: scale(0.95); }

        @keyframes pulseBtn {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(255, 77, 109, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }

        .btn-no { 
            background: rgba(255, 255, 255, 0.9); 
            color: #ff4d6d; 
            border: 2px solid #ff4d6d; 
            /* เปลี่ยนเป็น relative เพื่อให้จัดเรียงข้างๆ กับปุ่ม "รักสิ" ได้ตามปกติ */
            position: relative; 
            z-index: 5; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* --- พลุหัวใจ --- */
        .heart-burst { position: absolute; font-size: 28px; pointer-events: none; animation: flyOut 1.2s ease-out forwards; z-index: 100;}
        @keyframes flyOut {
            0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(1.5) rotate(var(--rot)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="screen1" class="screen active">
            <div class="envelope-wrapper" onclick="openLetter()">
                <div class="envelope-icon">💌</div>
            </div>
            <div class="click-text">มีจดหมายส่งถึงคับ! <br> <span style="font-size: 16px; color:#ff8fa3;">(จิ้มเพื่อเปิดเลยย 👆)</span></div>
        </div>

        <div id="screen2" class="screen">
            <div class="gif-container">
                <img id="bearGif" src="B31B02B3-E4F6-477C-892F-618D4CD4D535.jpg" alt="Cute Bear">
            </div>
            <div class="question">รักเค้ามั้ย? 🥺</div>
            <div class="sub-text">ตอบดีๆ นะ 💖</div>
            
            <div class="btn-group">
                <button class="btn-yes" onclick="answerYes()">รักสิ! 🥰</button>
                <button class="btn-no" id="btnNo" onmouseover="dodgeBtn()" ontouchstart="dodgeBtn()">ไม่รัก 😜</button>
            </div>
        </div>

        <div id="screen3" class="screen">
            <div class="gif-container">
                <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif" alt="Happy Bear">
            </div>
            <div class="question" style="font-size: 32px;">เย้! เค้าก็รักเทอนะ ♾️💕</div>
            <div class="sub-text" style="font-size: 18px; color: #ff3366; margin-top:10px; line-height: 1.6;">
                ขอบคุณที่น่ารักกับเค้ามาตลอดเลยนะ<br>จุ๊บเหม่ง 1 ที! จุ๊บๆ 😘
            </div>
        </div>

    </div>

    <script>
        // ฟังก์ชันเปลี่ยนหน้าจากซองจดหมาย ไปหน้าคำถาม
        function openLetter() {
            const screen1 = document.getElementById('screen1');
            screen1.style.animation = "fadeIn 0.5s reverse forwards";
            
            setTimeout(() => {
                screen1.classList.remove('active');
                document.getElementById('screen2').classList.add('active');
            }, 500);
        }

        // ฟังก์ชันปุ่มหนีสุดกวน
        function dodgeBtn() {
            const btn = document.getElementById('btnNo');
            
            // คำนวณให้กระโดดหนีไปไกลขึ้นแบบสุ่ม (ซ้ายขวา บนล่าง)
            const randomX = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 100 + 40);
            const randomY = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 100 + 40);
            
            btn.style.transform = `translate(${randomX}px, ${randomY}px) scale(0.9)`;
        }

        // ฟังก์ชันตอนแฟนกดยอมแพ้ (กดรัก)
        function answerYes() {
            document.getElementById('screen2').classList.remove('active');
            document.getElementById('screen3').classList.add('active');
            
            // สร้างพลุหัวใจกระจาย
            for(let i = 0; i < 80; i++) {
                setTimeout(createHeartBurst, i * 15);
            }
        }

        function createHeartBurst() {
            const hearts = ['❤️', '💖', '💘', '🌸', '✨', '🎀'];
            const el = document.createElement('div');
            el.classList.add('heart-burst');
            el.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            
            // จุดศูนย์กลางที่พลุจะแตกออก
            el.style.left = '50%';
            el.style.top = '50%';
            
            const angle = Math.random() * Math.PI * 2;
            const distance = 100 + Math.random() * 250; 
            const rotation = Math.random() * 360; 
            
            el.style.setProperty('--x', Math.cos(angle) * distance + 'px');
            el.style.setProperty('--y', Math.sin(angle) * distance + 'px');
            el.style.setProperty('--rot', rotation + 'deg');
            
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }
    </script>
</body>
</html>
